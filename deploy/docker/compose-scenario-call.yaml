# 用法：docker compose -p bytedesk -f compose-base.yaml -f compose-db-<mysql|postgresql|oracle>.yaml -f compose-mq-<artemis|rabbitmq>.yaml -f compose-scenario-call.yaml up -d
# 说明：配套 start.sh/stop.sh 的 call 场景目前支持 mysql 与 postgresql（oracle 尚未验证）
services:
  # Coturn TURN server
  # https://hub.docker.com/r/coturn/coturn
  # 参考：https://github.com/coturn/coturn/blob/master/docker/coturn/README.md
  # 说明：TURN 需要开放一段 UDP 中继端口范围（RFC 5766）。Docker 对超大端口段映射性能较差，
  # 这里按官方示例收敛到 49160-49200（可按需调整）。
  bytedesk-coturn:
    image: coturn/coturn:latest
    container_name: coturn-bytedesk
    restart: always
    ports:
      - "13478:3478"
      - "13478:3478/udp"
      - "15349:5349"
      - "15349:5349/udp"
      - "49160-49200:49160-49200/udp"
    command:
      - -n
      - --log-file=stdout
      - --min-port=49160
      - --max-port=49200
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --no-tlsv1
      - --realm=${COTURN_REALM:-bytedesk.local}
      - --user=${COTURN_USER}:${COTURN_PASS}
    volumes:
      - coturn_data:/var/lib/coturn
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD-SHELL", "turnutils_stunclient -p 3478 127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 15s

  # FreeSwitch 语音通话服务
  # 本地镜像Dockerfile地址：/Users/ningjinpeng/Desktop/git/github/bytedesk-freeswitch/docker/Dockerfile
  # https://hub.docker.com/r/bytedesk/freeswitch
  # https://github.com/Bytedesk/bytedesk-freeswitch
  # 使用自定义构建的 FreeSWITCH 镜像（支持 ARM64/AMD64）
  bytedesk-freeswitch:
    image: registry.cn-hangzhou.aliyuncs.com/bytedesk/freeswitch:latest
    container_name: freeswitch-bytedesk
    restart: always
    entrypoint: ["/usr/local/bin/bytedesk-entrypoint.sh"]
    command: ["freeswitch", "-nf", "-nonat", "-nonatmap"]
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "0"
      net.ipv6.conf.default.disable_ipv6: "0"
    environment:
      TZ: Asia/Shanghai
      DISABLE_IPV6: "true"
      # ESL 入站口令（与 vars.xml 的 esl_password 对应）
      FREESWITCH_ESL_PASSWORD: ${FREESWITCH_ESL_PASSWORD}
      # xml_cdr Basic 凭据密码
      FREESWITCH_CDR_PASSWORD: ${FREESWITCH_CDR_PASSWORD:-bytedesk123}
      # mod_xml_curl 鉴权 token（需与应用侧配置一致）
      FREESWITCH_XML_CURL_TOKEN: ${FREESWITCH_XML_CURL_TOKEN:-change_me_in_production}
      # mod_xml_curl 回源地址（与 XmlCurlController 统一：/freeswitch/api/v1/xmlcurl）
      FREESWITCH_XML_CURL_GATEWAY_URL: ${FREESWITCH_XML_CURL_GATEWAY_URL:-http://host.docker.internal:9003/freeswitch/api/v1/xmlcurl}
      # 应用基础地址（用于 cdr_url/user_lookup_url 等派生）
      FREESWITCH_API_BASE_URL: ${FREESWITCH_API_BASE_URL:-http://host.docker.internal:9003}
      # FreeSWITCH 数据库连接参数
      FREESWITCH_DB_HOST: ${FREESWITCH_DB_HOST:-bytedesk-db}
      FREESWITCH_DB_PORT: ${FREESWITCH_DB_PORT:-3306}
      FREESWITCH_DB_NAME: ${FREESWITCH_DB_NAME:-bytedesk_freeswitch}
      FREESWITCH_DB_USERNAME: ${FREESWITCH_DB_USERNAME:-root}
      FREESWITCH_DB_PASSWORD: ${FREESWITCH_DB_PASSWORD:-r8FqfdbWUaN3}
      # WebRTC / RTP 参数（默认使用 compose 内 coturn 服务）
      FREESWITCH_STUN_SERVER: ${FREESWITCH_STUN_SERVER:-stun:bytedesk-coturn:3478}
      FREESWITCH_RTP_START_PORT: ${FREESWITCH_RTP_START_PORT:-16384}
      FREESWITCH_RTP_END_PORT: ${FREESWITCH_RTP_END_PORT:-32768}
    ports:
      - "15060:5060/tcp"
      - "15060:5060/udp"
      - "15080:5080/tcp"
      - "15080:5080/udp"
      - "15061:5061/tcp"
      - "15081:5081/tcp"
      - "15066:5066/tcp"
      - "17443:7443/tcp"
      - "18021:8021/tcp"
      - "18081-18082:8081-8082/tcp"
      - "16000-16129:6000-6129/udp"
    volumes:
      - ../freeswitch/conf:/usr/local/freeswitch/etc/freeswitch
      - ../freeswitch/conf:/usr/local/freeswitch/conf
      - ../freeswitch/bin/bytedesk-entrypoint.sh:/usr/local/bin/bytedesk-entrypoint.sh:ro
      - freeswitch_data:/usr/local/freeswitch/db
      - ../freeswitch/log:/usr/local/freeswitch/log
      - ../freeswitch/sounds:/usr/local/freeswitch/sounds
      - ../freeswitch/recordings:/usr/local/freeswitch/recordings
      - ../freeswitch/etc/odbc.ini:/etc/odbc.ini:ro
      - ../freeswitch/etc/odbcinst.ini:/etc/odbcinst.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      bytedesk-db:
        condition: service_healthy
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD-SHELL", "fs_cli -p ${FREESWITCH_ESL_PASSWORD} -x 'status' | grep -q 'UP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Janus WebRTC Gateway
  # https://github.com/meetecho/janus-gateway
  # [github](https://github.com/Bytedesk/bytedesk-janus)
  # [janus docker镜像](https://hub.docker.com/r/bytedesk/janus)
  # Janus WebRTC Gateway（仅启动 Janus，不启用 nginx）
  # 启动后可在浏览器访问端口（用于连通性），但直接 GET 通常会返回 404（正常）：
  # - http://localhost:18089
  # - ws://localhost:18188/janus （WebSocket API，需通过客户端连接，非普通网页）
  # 正确检查方式（HTTP API 需 POST 到 /janus）：
  # curl -sS -X POST -H 'Content-Type: application/json' --data '{"janus":"ping","transaction":"check"}' http://localhost:18089/janus
  bytedesk-janus:
    image: registry.cn-hangzhou.aliyuncs.com/bytedesk/janus:latest
    container_name: janus-bytedesk
    restart: always
    ports:
      - "18089:8088/tcp"
      - "18090:8089/tcp"
      - "18188:8188/tcp"
      - "17188:7188/tcp"
      - "18178:3478/udp"
      - "18179:3478/tcp"
      - "11000-11200:10000-10200/udp"
    command: ["/usr/local/bin/janus", "-F", "/usr/local/etc/janus"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ../janus/etc/janus:/usr/local/etc/janus:ro
    depends_on:
      bytedesk-coturn:
        condition: service_healthy
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sS -X POST -H 'Content-Type: application/json' --data '{\"janus\":\"ping\",\"transaction\":\"healthcheck\"}' http://127.0.0.1:8088/janus | grep -qi pong"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  coturn_data:
    name: bytedesk_coturn_data
  freeswitch_data:
    name: bytedesk_freeswitch_data
