# 用法：docker compose -p bytedesk -f compose-base.yaml -f compose-db-oracle.yaml -f compose-scenario-standard.yaml up -d
services:
  bytedesk-db:
    image: gvenzl/oracle-free:23-slim
    container_name: oracle-bytedesk
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${ORACLE_APP_USER}
      APP_USER_PASSWORD: ${ORACLE_APP_USER_PASSWORD}
      ORACLE_DATABASE: ${ORACLE_DATABASE}
      TZ: Asia/Shanghai
    ports:
      - "11521:1521"
      - "15500:5500"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - bytedesk-network

  bytedesk:
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@bytedesk-db:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: ${ORACLE_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORACLE_APP_USER_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver

volumes:
  oracle_data:
    name: bytedesk_oracle_data
