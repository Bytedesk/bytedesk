# ===============================
#= Call FreeSwitch config
# ===============================
# enable call freeswitch
bytedesk.call.freeswitch.enabled=false
# freeswitch server ip
bytedesk.call.freeswitch.server=127.0.0.1
# esl port
bytedesk.call.freeswitch.esl-port=8021
# esl password
bytedesk.call.freeswitch.esl-password=password
# sip port - 根据服务器实际端口修改
bytedesk.call.freeswitch.sip-port=5060
# webrtc port - 根据服务器实际端口修改
bytedesk.call.freeswitch.webrtc-port=7443
# websocket signal port - 根据服务器实际端口修改
bytedesk.call.freeswitch.ws-port=5066
# call timeout seconds - 增加超时时间
bytedesk.call.freeswitch.call-timeout=120
# rtp port range - 扩大端口范围
# bytedesk.call.freeswitch.rtp-port-start=16000
# bytedesk.call.freeswitch.rtp-port-end=16999
# 新增配置
# bytedesk.call.freeswitch.max-sessions=1000
# bytedesk.call.freeswitch.sessions-per-second=30
# bytedesk.call.freeswitch.log-level=WARNING

# ===============================
#= Janus WebRTC Gateway config
# ===============================
# 是否启用 Janus 后端接入（VideoRoom/AudioBridge/SIP/Admin）
bytedesk.video.janus.enabled=false
# Janus API WebSocket 地址（对应 compose: 18188 -> 8188）
bytedesk.video.janus.ws-url=ws://127.0.0.1:18188/janus
# Janus SDK 日志开关
bytedesk.video.janus.log-enabled=true
# 单次调用超时（毫秒）
bytedesk.video.janus.operation-timeout-ms=10000

# Janus Admin API
bytedesk.video.janus.admin.enabled=true
# Admin WebSocket 地址（对应 compose: 17188 -> 7188）
bytedesk.video.janus.admin.ws-url=ws://127.0.0.1:17188/janus
# Admin 密钥（请与 deploy/janus/etc/janus/janus.jcfg 的 admin_secret 保持一致）
bytedesk.video.janus.admin.secret=janusoverlord

# VideoRoom 默认参数
bytedesk.video.janus.video-room.default-publishers=6
bytedesk.video.janus.video-room.default-permanent=false

# AudioBridge 默认参数
bytedesk.video.janus.audio-bridge.default-permanent=false
