# ===============================
# = Spring Batch Configuration
# ===============================
# 禁止启动时自动执行作业
spring.batch.job.enabled=false
# 始终初始化批处理表，生产环境建议设置为never
spring.batch.jdbc.initialize-schema=never
# 表前缀，默认是BATCH_
# spring.batch.jdbc.schema=classpath:org/springframework/batch/core/schema-mysql.sql
# spring.batch.jdbc.table-prefix=BD_BATCH_

# ===============================
# City Import (optional, async)
# ===============================
# 说明：用于首次启动后后台导入大体量城市数据（不阻塞启动）。默认关闭。
# stagingScript: 直接导入 bytedesk_core_city.sql 到 bytedesk_core_city
bytedesk.city.import.enabled=false
bytedesk.city.import.force=false
bytedesk.city.import.delay-ms=10000
bytedesk.city.import.staging-script=classpath:sql/city/bytedesk_core_city.sql
bytedesk.city.import.fallback-staging-file=${user.dir}/bytedesk_core_city.sql
# 默认留空：脚本已直接写入 bytedesk_core_city
bytedesk.city.import.transform-script=
bytedesk.city.import.drop-staging-after=true
bytedesk.city.import.lock-name=bytedesk:city:import
bytedesk.city.import.lock-timeout-seconds=0


#
# ===============================
# = liquibase
# https://contribute.liquibase.com/extensions-channels/directory/integration-docs/springboot/configuration/
