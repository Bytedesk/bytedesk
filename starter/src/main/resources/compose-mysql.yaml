# 用法：docker compose -p bytedesk -f compose.common.yaml -f compose-mysql.yaml -f compose.yaml up -d
services:

  # https://hub.docker.com/_/mysql
  bytedesk-mysql:
    image: mysql:latest
    container_name: mysql-bytedesk
    restart: always
    environment:
      MYSQL_DATABASE: bytedesk
      MYSQL_ROOT_PASSWORD: r8FqfdbWUaN3
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - bytedesk-network

  # FreeSwitch 依赖数据库可用（MySQL 方案）
  bytedesk-freeswitch:
    depends_on:
      - bytedesk-mysql

volumes:
  mysql_data:
    name: bytedesk_mysql_data