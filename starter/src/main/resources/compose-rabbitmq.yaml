# 用法：docker compose -p bytedesk -f compose.common.yaml -f compose-<mysql|postgresql|oracle>.yaml -f compose-rabbitmq.yaml up -d
services:

  # RabbitMQ 消息队列
  # https://hub.docker.com/_/rabbitmq
  # http://localhost:15673 (管理后台)
  bytedesk-rabbitmq:
    image: rabbitmq:4.2.3-management
    container_name: rabbitmq-bytedesk
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
      - TZ=Asia/Shanghai
    ports:
      - "5673:5672"     # AMQP
      - "15673:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  rabbitmq_data:
    name: bytedesk_rabbitmq_data
