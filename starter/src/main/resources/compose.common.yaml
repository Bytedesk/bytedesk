services:

  # https://hub.docker.com/_/redis
  bytedesk-redis:
    image: redis/redis-stack-server:latest
    container_name: redis-bytedesk
    restart: always
    ports:
      - "16379:6379"
    environment:
      - REDIS_ARGS=--requirepass qfRxz3tVT8Nh
    volumes:
      - redis_data:/data
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "qfRxz3tVT8Nh", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # http://127.0.0.1:21434
  bytedesk-ollama:
    image: ollama/ollama:latest
    container_name: ollama-bytedesk
    restart: always
    ports:
      - "21434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_MODELS=qwen3:0.6b
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 5

  # https://hub.docker.com/_/elasticsearch
  # ElasticSearch 全文检索 && 向量数据库
  bytedesk-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: elasticsearch-bytedesk
    restart: always
    environment:
      - node.name=bytedesk-es01
      - cluster.name=bytedesk-es-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=bytedesk123
    ulimits:
      memlock:
        soft: -1
        hard: -1
    entrypoint: ["bash", "-c", "if [ ! -d /usr/share/elasticsearch/plugins/analysis-ik ]; then echo 'Installing IK plugin...'; if [ -f /tmp/elasticsearch-analysis-ik-8.18.0.zip ]; then /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch file:///tmp/elasticsearch-analysis-ik-8.18.0.zip; else curl -fsSL -o /tmp/elasticsearch-analysis-ik-8.18.0.zip https://www.weiyuai.cn/download/elasticsearch-analysis-ik-8.18.0.zip && /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch file:///tmp/elasticsearch-analysis-ik-8.18.0.zip; fi; fi; exec /usr/local/bin/docker-entrypoint.sh"]
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      # 默认安装 IK 分词插件（本地文件）
      # 如无本地文件，将自动从 https://www.weiyuai.cn/download/elasticsearch-analysis-ik-8.18.0.zip 下载
      - ./elasticsearch-analysis-ik-8.18.0.zip:/tmp/elasticsearch-analysis-ik-8.18.0.zip:ro
    ports:
      - "19200:9200"
      - "19300:9300"
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Zipkin 分布式追踪系统- Spring Ai Observability
  bytedesk-zipkin:
    image: 'openzipkin/zipkin:latest'
    container_name: zipkin-bytedesk
    restart: always
    ports:
      - '19411:9411'
    volumes:
      - zipkin_data:/data
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9411/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO 对象存储服务
  # http://localhost:19000 - MinIO Console
  # http://localhost:19001 - MinIO API
  bytedesk-minio:
    image: minio/minio:latest
    container_name: minio-bytedesk
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
      - TZ=Asia/Shanghai
    ports:
      - "19000:9000"   # API
      - "19001:9001"   # Console
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Coturn TURN server
  # https://hub.docker.com/r/coturn/coturn
  # 参考：https://github.com/coturn/coturn/blob/master/docker/coturn/README.md
  # 说明：TURN 需要开放一段 UDP 中继端口范围（RFC 5766）。Docker 对超大端口段映射性能较差，
  # 这里按官方示例收敛到 49160-49200（可按需调整）。
  bytedesk-coturn:
    image: coturn/coturn:latest
    container_name: coturn-bytedesk
    restart: always
    ports:
      - "13478:3478"
      - "13478:3478/udp"
      - "15349:5349"
      - "15349:5349/udp"
      - "49160-49200:49160-49200/udp"
    command:
      - -n
      - --log-file=stdout
      - --min-port=49160
      - --max-port=49200
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --no-tlsv1
      - --realm=${COTURN_REALM:-bytedesk.local}
      - --user=${COTURN_USER:-bytedesk}:${COTURN_PASS:-bytedesk123}
    volumes:
      - coturn_data:/var/lib/coturn
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD-SHELL", "turnutils_stunclient -p 3478 127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 15s

  # FreeSwitch 语音通话服务
  # https://hub.docker.com/r/bytedesk/freeswitch
  # https://github.com/Bytedesk/bytedesk-freeswitch
  # 使用自定义构建的 FreeSWITCH 镜像（支持 ARM64/AMD64）
  bytedesk-freeswitch:
    image: registry.cn-hangzhou.aliyuncs.com/bytedesk/freeswitch:latest
    container_name: freeswitch-bytedesk
    restart: always
    # 使用 -nf (no fork) 参数在前台运行，避免容器退出
    command: ["freeswitch", "-nf", "-nonat", "-nonatmap"]
    environment:
      - TZ=Asia/Shanghai
      - DISABLE_IPV6=true
    ports:
      - "15060:5060/tcp"
      - "15060:5060/udp"
      - "15080:5080/tcp"
      - "15080:5080/udp"
      - "15061:5061/tcp"
      - "15081:5081/tcp"
      - "15066:5066/tcp"
      - "17443:7443/tcp"
      - "18021:8021/tcp"
      - "18081-18082:8081-8082/tcp"
      - "16000-16129:6000-6129/udp"
    volumes:
      - ../../../../deploy/freeswitch/conf:/usr/local/freeswitch/etc/freeswitch
      - freeswitch_data:/usr/local/freeswitch/db
      - ../../../../deploy/freeswitch/log:/usr/local/freeswitch/log
      - ../../../../deploy/freeswitch/sounds:/usr/local/freeswitch/sounds
      - ../../../../deploy/freeswitch/recordings:/usr/local/freeswitch/recordings
      - ../../../../deploy/freeswitch/etc/odbc.ini:/etc/odbc.ini:ro
      - ../../../../deploy/freeswitch/etc/odbcinst.ini:/etc/odbcinst.ini:ro
    networks:
      - bytedesk-network

  # https://github.com/meetecho/janus-gateway
  # [github](https://github.com/Bytedesk/bytedesk-janus)
  # [janus docker镜像](https://hub.docker.com/r/bytedesk/janus)
  # Janus WebRTC Gateway（仅启动 Janus，不启用 nginx）
  # 启动后可在浏览器访问端口（用于连通性），但直接 GET 通常会返回 404（正常）：
  # - http://localhost:18089
  # - ws://localhost:18188/janus （WebSocket API，需通过客户端连接，非普通网页）
  # 正确检查方式（HTTP API 需 POST 到 /janus）：
  # curl -sS -X POST -H 'Content-Type: application/json' --data '{"janus":"ping","transaction":"check"}' http://localhost:18089/janus
  bytedesk-janus:
    image: 'registry.cn-hangzhou.aliyuncs.com/bytedesk/janus:latest'
    container_name: janus-bytedesk
    restart: always
    ports:
      - "18089:8088/tcp"
      - "18090:8089/tcp"
      - "18188:8188/tcp"
      - "17188:7188/tcp"
      - "18178:3478/udp"
      - "18179:3478/tcp"
      - "11000-11200:10000-10200/udp"
    command: ["/usr/local/bin/janus", "-F", "/usr/local/etc/janus"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ../../../../deploy/janus/etc/janus:/usr/local/etc/janus:ro
    depends_on:
      bytedesk-coturn:
        condition: service_healthy
    networks:
      - bytedesk-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sS -X POST -H 'Content-Type: application/json' --data '{\"janus\":\"ping\",\"transaction\":\"healthcheck\"}' http://127.0.0.1:8088/janus | grep -qi pong"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s


volumes:
  kingbase_data:
    name: bytedesk_kingbase_data
  redis_data:
    name: bytedesk_redis_data
  ollama_models:
    name: bytedesk_ollama_models
  prometheus_data:
    name: bytedesk_prometheus_data
  grafana_data:
    name: bytedesk_grafana_data
  ldap_data:
    name: bytedesk_ldap_data
  ldap_config:
    name: bytedesk_ldap_config
  elasticsearch_data:
    name: bytedesk_elasticsearch_data
  zipkin_data:
    name: bytedesk_zipkin_data
  coturn_data:
    name: bytedesk_coturn_data
  minio_data:
    name: bytedesk_minio_data
  freeswitch_config:
    name: bytedesk_freeswitch_config
  freeswitch_sounds:
    name: bytedesk_freeswitch_sounds
  freeswitch_data:
    name: bytedesk_freeswitch_data
  freeswitch_logs:
    name: bytedesk_freeswitch_logs
  freeswitch_tmp:
    name: bytedesk_freeswitch_tmp
  freeswitch_recordings:
    name: bytedesk_freeswitch_recordings

networks:
  bytedesk-network:
    driver: bridge
    enable_ipv6: true
